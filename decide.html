<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="robots" content="noindex"/>
<title>Approve your video - Aligned Web Services</title>
<style>
  :root{ --bg:#0e1116; --card:#161b22; --line:#262d38; --text:#e8ecf2; --muted:#9aa6b6; --muted2:#6b7689; --purple:#7c5cff; --grad:linear-gradient(135deg,#7c5cff,#22b8a6); --green:#16a34a; --gold:#caa45a; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;}
  .wrap{max-width:520px;margin:0 auto;padding:22px 18px 60px;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .brand svg{width:30px;height:30px}
  .brand b{font-size:15px;letter-spacing:.2px}
  .brand span{color:var(--muted2);font-size:12px;display:block;margin-top:-2px}
  h1{font-size:21px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:14px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px}
  video{width:100%;border-radius:12px;background:#000;display:block}
  .cap{color:var(--muted);font-size:13px;white-space:pre-wrap;margin-top:12px;max-height:160px;overflow:auto}
  .btns{display:flex;flex-direction:column;gap:10px;margin-top:18px}
  button{font:inherit;font-weight:700;border:none;border-radius:12px;padding:15px;cursor:pointer;width:100%}
  .approve{background:var(--green);color:#fff}
  .reject{background:transparent;color:#e9a0a8;border:1px solid #5a2f37}
  .reasons{display:none;margin-top:16px}
  .reasons.show{display:block}
  .reasons .r{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:8px 13px;margin:0 8px 8px 0;font-size:13px;color:var(--muted);cursor:pointer}
  .reasons .r.sel{background:rgba(124,92,255,.18);border-color:var(--purple);color:#cbbcff}
  textarea{width:100%;background:#0e1116;border:1px solid var(--line);border-radius:10px;color:var(--text);padding:11px;font:inherit;min-height:74px;margin-top:8px}
  .done{text-align:center;padding:40px 10px}
  .done .ic{font-size:42px;margin-bottom:10px}
  .done h2{margin:0 0 6px;font-size:20px}
  .done p{color:var(--muted);margin:0}
  .foot{color:var(--muted2);font-size:11px;text-align:center;margin-top:24px}
  .hidden{display:none}
  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;vertical-align:-4px;margin-right:8px;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aligned Web Services logo"><defs><linearGradient id="alogo" x1="0" y1="15" x2="0" y2="46" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#9B6BE0"/><stop offset="1" stop-color="#16A34A"/></linearGradient></defs><line x1="18" y1="16" x2="30" y2="43" stroke="url(#alogo)" stroke-width="3.4"/><line x1="30" y1="16" x2="30" y2="43" stroke="url(#alogo)" stroke-width="3.4"/><line x1="42" y1="16" x2="30" y2="43" stroke="url(#alogo)" stroke-width="3.4"/><rect x="13" y="44" width="34" height="5.6" rx="2.8" fill="#16A34A"/><circle cx="18" cy="16" r="4" fill="#9B6BE0"/><circle cx="30" cy="16" r="4" fill="#9B6BE0"/><circle cx="42" cy="16" r="4" fill="#9B6BE0"/></svg>
    <div><b>Aligned Web Services</b><span>Your content engine</span></div>
  </div>

  <div id="main">
    <h1>Your video is ready 🎬</h1>
    <p class="sub">Give it a quick look. Approve it to post, or request a change and we'll remake it - free.</p>
    <div class="card">
      <video id="vid" controls playsinline preload="metadata"></video>
      <div class="cap hidden" id="cap"></div>
    </div>
    <div class="btns">
      <button class="approve" id="approveBtn">Approve &amp; post</button>
      <button class="reject" id="rejectBtn">Request a change</button>
    </div>
    <div class="reasons" id="reasons">
      <div style="font-size:13.5px;margin:4px 0 10px;color:var(--text)">What should we fix?</div>
      <div id="rgrid"></div>
      <textarea id="note" placeholder="Anything else? (optional)"></textarea>
      <div class="btns"><button class="reject" id="rejectSubmit" style="color:#fff;background:#7c3a44;border:none">Send &amp; remake</button></div>
    </div>
  </div>

  <div id="done" class="done hidden"></div>
  <div class="foot">Aligned Web Services · You're receiving this because you approve your own content before it posts.</div>
</div>

<script>
  var WEBHOOK = "https://alignedwebservices.app.n8n.cloud/webhook/decision";
  var REASONS = ["Voice didn't match","Tone was off","Pacing / timing","Visuals / B-roll","Script wording","Caption style","Other"];
  function qp(k){ try{ return new URLSearchParams(location.search).get(k)||""; }catch(e){ return ""; } }
  var vid = qp("vid"), email = qp("email"), dl = qp("dl") || qp("videoUrl"), cap = qp("cap"), pre = (qp("d")||"").toLowerCase();
  var loc = qp("loc"), uid = qp("uid");

  var v = document.getElementById("vid");
  if(dl){ v.src = dl; } else { v.parentNode.style.display="none"; }
  if(cap){ var c=document.getElementById("cap"); c.textContent = cap; c.classList.remove("hidden"); }

  function rgrid(){
    var g=document.getElementById("rgrid");
    g.innerHTML = REASONS.map(function(r){ return '<span class="r">'+r+'</span>'; }).join("");
    Array.prototype.forEach.call(g.querySelectorAll(".r"), function(el){ el.onclick=function(){ el.classList.toggle("sel"); }; });
  }
  rgrid();

  function showDone(icon,title,msg){
    document.getElementById("main").classList.add("hidden");
    var d=document.getElementById("done");
    d.innerHTML = '<div class="ic">'+icon+'</div><h2>'+title+'</h2><p>'+msg+'</p>';
    d.classList.remove("hidden");
  }
  function send(payload, btn, busyText){
    if(btn){ btn.dataset.t=btn.innerHTML; btn.innerHTML='<span class="spinner"></span>'+busyText; btn.disabled=true; }
    return fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
      .catch(function(){ /* fire-and-forget; we still confirm to the user */ });
  }

  document.getElementById("approveBtn").onclick=function(){
    send({ action:"decision", decision:"approve", videoId:vid, email:email, videoUrl:dl, caption:cap, loc:loc, userId:uid }, this, "Posting…")
      .then(function(){ showDone("✅","Approved!","We're posting it to your socials now. Nice work."); });
  };
  document.getElementById("rejectBtn").onclick=function(){
    document.getElementById("reasons").classList.add("show");
    this.classList.add("hidden");
    document.getElementById("approveBtn").classList.add("hidden");
  };
  document.getElementById("rejectSubmit").onclick=function(){
    var reasons = Array.prototype.map.call(document.querySelectorAll("#rgrid .r.sel"), function(el){ return el.textContent; });
    if(!reasons.length){ alert("Pick at least one thing to fix so we can improve it."); return; }
    var note=document.getElementById("note").value.trim();
    send({ action:"decision", decision:"reject", videoId:vid, email:email, videoUrl:dl, caption:cap, loc:loc, userId:uid, reasons:reasons, note:note }, this, "Sending…")
      .then(function(){ showDone("🛠️","Got it - on it.","We're remaking your video with those changes. You'll get a fresh one to approve shortly."); });
  };

  // If the SMS link pre-selected an action (?d=approve / ?d=reject), honor it but still confirm.
  if(pre==="approve"){ document.getElementById("approveBtn").click(); }
  else if(pre==="reject"){ document.getElementById("rejectBtn").click(); }
</script>
</body>
</html>
